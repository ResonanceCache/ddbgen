name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Unit tests (includes generated-code build and model tests)
        run: go test ./...
      - name: Race detector (runtime package)
        run: go test -race ./runtime/...

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Schema snapshot drift check
        run: go run ./cmd/ddbgen diff ./examples/ecommerce
      - name: Generated code is current
        run: |
          go run ./cmd/ddbgen generate ./examples/ecommerce
          go run ./cmd/ddbgen docs ./examples/ecommerce
          go run ./cmd/ddbgen infra --format cfn --out examples/ecommerce/infra ./examples/ecommerce
          go run ./cmd/ddbgen infra --format tf --out examples/ecommerce/infra ./examples/ecommerce
          git diff --exit-code
          test -z "$(git status --porcelain)" || { git status --porcelain; echo "untracked generated files"; exit 1; }

  integration:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Integration tests against DynamoDB Local
        run: go test -count=1 -tags=integration ./examples/...
        env:
          DDB_TEST_ENDPOINT: http://localhost:8000
